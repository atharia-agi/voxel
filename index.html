<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAA-Quality Voxel World - Browser Engine</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Inline critical styles only */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
            color: white;
        }
        
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        
        #game-canvas {
            width: 100%;
            height: 100%;
            display: block;
            background: #0f0f1a;
        }
        
        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        
        .stats-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            font-family: 'Consolas', monospace;
        }
        
        .controls-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        
        .button {
            background: linear-gradient(45deg, #4a6fa5, #3a5a8a);
            border: none;
            color: white;
            padding: 8px 16px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        
        .button:hover {
            background: linear-gradient(45deg, #5a7fb5, #4a6a9a);
            transform: translateY(-2px);
        }
        
        .button:active {
            transform: translateY(0);
        }
        
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a15;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }
        
        .loading-bar {
            width: 300px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            margin: 20px 0;
        }
        
        .loading-progress {
            height: 100%;
            background: linear-gradient(90deg, #4a6fa5, #7cb9e8);
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .loading-text {
            font-size: 18px;
            color: #7cb9e8;
            margin-top: 10px;
        }
        
        .title {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #4a6fa5, #7cb9e8, #4a6fa5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-size: 200% auto;
            animation: textShine 3s linear infinite;
        }
        
        @keyframes textShine {
            to {
                background-position: 200% center;
            }
        }
    </style>
</head>
<body>
    <div class="loading-screen" id="loading-screen">
        <div class="title">VOXEL ENGINE PRO</div>
        <div class="loading-bar">
            <div class="loading-progress" id="loading-progress"></div>
        </div>
        <div class="loading-text" id="loading-text">Initializing engine...</div>
    </div>

    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        
        <div class="ui-overlay">
            <h3>🎮 Voxel World Controls</h3>
            <p>WASD - Move | Mouse - Look</p>
            <p>Space - Jump | Shift - Sprint</p>
            <p>Left Click - Break | Right Click - Place</p>
            <p>1-9 - Select Block | E - Inventory</p>
        </div>
        
        <div class="stats-panel">
            <div>FPS: <span id="fps">0</span></div>
            <div>Chunks: <span id="chunks">0</span></div>
            <div>Vertices: <span id="vertices">0</span></div>
            <div>Draw Calls: <span id="draw-calls">0</span></div>
            <div>Memory: <span id="memory">0</span> MB</div>
        </div>
        
        <div class="controls-panel">
            <button class="button" onclick="world.generate()">🔄 Regenerate World</button>
            <button class="button" onclick="world.toggleLighting()">💡 Toggle Lighting</button>
            <button class="button" onclick="world.toggleShadows()">🌑 Toggle Shadows</button>
            <button class="button" onclick="world.toggleWireframe()">🔲 Wireframe</button>
            <button class="button" onclick="character.spawn()">👤 Spawn Character</button>
            <button class="button" onclick="timeOfDay.toggle()">🌓 Day/Night</button>
        </div>
    </div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- Voxel Engine Core -->
    <script src="src/engine/core.js"></script>
    <script src="src/engine/voxel.js"></script>
    <script src="src/engine/chunk.js"></script>
    <script src="src/engine/world.js"></script>
    <script src="src/engine/lighting.js"></script>
    <script src="src/engine/perlin.js"></script>
    
    <!-- Characters -->
    <script src="src/characters/character.js"></script>
    <script src="src/characters/player.js"></script>
    <script src="src/characters/npc.js"></script>
    
    <!-- Assets -->
    <script src="src/assets/texture-manager.js"></script>
    <script src="src/assets/model-loader.js"></script>
    
    <!-- Main Game -->
    <script src="src/game/main.js"></script>
</body>
</html>
